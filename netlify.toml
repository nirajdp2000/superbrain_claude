[build]
  command = "npm run build"
  publish = "public"

[build.environment]
  SUPERBRAIN_PUBLIC_SITE_URL = "https://stockbrain.netlify.app"
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[dev]
  command = "npm run ui:dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false

# ── Netlify Scheduled Functions ─────────────────────────────────────────────
# TRANSFORMATION_ROADMAP §0.5.2 + §5 Phase 2 / Phase 1.5 pre-req
#
# DISABLED until function files exist under netlify/functions/.
# Currently only refresh-upstox-token.mjs and server.mjs are implemented;
# scheduling missing function names causes Netlify build warnings and
# wastes platform quota with no-op invocations.
#
# When implementing, create the file at netlify/functions/<name>.mjs and
# uncomment the matching block. Cron: All times UTC. IST = UTC+5:30.
# Each function has a 15-minute background timeout (vs 10s for HTTP functions).
# Functions write to Netlify Blobs stores defined in snapshot-cache.mjs.
#
# Until then, top-signals-service.mjs gracefully falls back to live scans
# (see getUniverseScan() try/catch in that file).

